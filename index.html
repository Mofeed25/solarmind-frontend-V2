<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Solar Mind | لوحة التحكم الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <div class="brand-logo"><i class="fa-solid fa-solar-panel"></i> Solar Mind</div>
        <ul class="menu-links">
            <li class="active"><a href="#"><i class="fa-solid fa-gauge"></i> لوحة التحكم</a></li>
            <li><a href="#"><i class="fa-solid fa-warehouse"></i> المخازن</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="dashboard-header">
            <!-- كروت المؤشرات مع الرسوم البيانية الصغيرة -->
            <div class="metric-card"><canvas id="salesChart" width="50" height="50"></canvas><h3>المبيعات</h3><p id="sales-value">$0</p></div>
            <div class="metric-card"><canvas id="profitChart" width="50" height="50"></canvas><h3>الأرباح</h3><p id="profit-value">$0</p></div>
        </div>

        <div class="chat-container">
            <div class="chat-messages" id="chat-box">
                <div class="message bot">أهلاً بك. أنا مستشارك المالي والإداري لـ Solar Mind، كيف يمكنني مساعدتك اليوم؟</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="user-input" placeholder="اكتب استفسارك هنا...">
                <button class="send-btn" onclick="sendChatMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
