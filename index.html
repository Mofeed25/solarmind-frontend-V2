<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Solar Mind | النظام الذكي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <div class="brand-logo">☀️ Solar Mind</div>
        <ul class="menu-links">
            <li>لوحة التحكم الحية</li>
            <li>تحليل المخزون</li>
            <li>التقارير المالية</li>
        </ul>
        <div class="footer-copy">© 2026 انديكيتورز للاستشارات</div>
    </div>

    <div class="main-content">
        <div class="metrics-grid">
            <div class="card"><h3>إجمالي المبيعات</h3><p id="sales-value">جاري التحميل...</p></div>
            <div class="card"><h3>صافي الأرباح</h3><p id="profit-value">جاري التحميل...</p></div>
            <div class="card"><h3>حالة المخزون</h3><p>مستقر</p></div>
        </div>
        <div class="chat-window">
            <div id="chat-box"></div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="اكتب سؤالك هنا...">
                <button onclick="sendChatMessage()">إرسال</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
